<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Search</title>
</head>
<body>

    <input id="productId" placeholder="Enter product ID (1-20)" />

    <button onclick="getProduct()">Search</button>

    <br><br>

    <h3 id="title"></h3>
    <h4 id="price"></h4>
    <p id="desc"></p>
    <p id="category"></p>
    <p id="rating"></p>

    <script>
        async function getProduct() {
            const id = document.getElementById("productId").value;

            try {
                const res = await fetch(`https://fakestoreapi.com/products/${id}`);

                if (!res.ok) {
                    throw new Error("Product not found");
                }

                const data = await res.json();

                document.getElementById("title").textContent = data.title;
                document.getElementById("price").textContent = "Price: $" + data.price;
                document.getElementById("desc").textContent = data.description;
                document.getElementById("category").textContent = "Category: " + data.category;
                document.getElementById("rating").textContent =
                    "Rating: " + data.rating.rate + " (" + data.rating.count + " reviews)";

            } catch (err) {
                document.getElementById("title").textContent = err.message;
                document.getElementById("price").textContent = "";
                document.getElementById("desc").textContent = "";
                document.getElementById("category").textContent = "";
                document.getElementById("rating").textContent = "";
            }
        }
    </script>

</body>
</html>
