<!DOCTYPE html>
<html>
<head>
    <title>Pokemon Battle</title>

    <style>
        body{
            background:#e5e5e5;
            font-family:Arial, sans-serif;
        }

        h1{
            color:#29a3ef;
            margin-left:30px;
        }

        .window{
            width:900px;
            margin:auto;
            border:2px solid #777;
            background:#f2f2f2;
        }

        .browser-bar{
            height:30px;
            border-bottom:2px solid #777;
            background:#ddd;
        }

        .arena{
            margin:20px;
            height:380px;
            border:2px solid #888;
            background:#fafafa;
            position:relative;
        }

        .top-card{
            position:absolute;
            top:20px;
            left:20px;
            width:250px;
            border:2px solid #888;
            background:white;
            padding:15px;
            border-radius:4px;
        }

        .bottom-card{
            position:absolute;
            bottom:40px;
            right:20px;
            width:250px;
            border:2px solid #888;
            background:white;
            padding:15px;
            border-radius:4px;
        }

        .top-pokemon{
            position:absolute;
            top:40px;
            right:50px;
        }

        .bottom-pokemon{
            position:absolute;
            bottom:20px;
            left:30px;
        }

        .top-pokemon img{
            width:140px;
            height:140px;
        }

        .bottom-pokemon img{
            width:220px;
            height:220px;
            transform:scaleX(-1);
        }

        h2{
            margin:0;
        }

        .power{
            float:right;
            background:#b7efb7;
            padding:5px 10px;
            border-radius:12px;
            font-size:12px;
        }

        .power2{
            float:right;
            background:#cde3ff;
            padding:5px 10px;
            border-radius:12px;
            font-size:12px;
        }

        .log-title{
            margin-left:20px;
            font-weight:bold;
        }

        .bottom-section{
            display:flex;
            gap:20px;
            margin:20px;
        }

        .log{
            flex:1;
            height:100px;
            border:2px solid #888;
            background:white;
            padding:10px;
        }

        button{
            width:140px;
            height:40px;
            margin-top:5px;
            cursor:pointer;
            font-size:16px;
        }
    </style>
</head>

<body>

<h1>Battle Wireframe</h1>

<div class="window">

    <div class="browser-bar"></div>

    <div class="arena">

        <div class="top-card">
            <h2 id="name1">Pokemon 1</h2>
            <span class="power" id="power1"></span>
        </div>

        <div class="top-pokemon">
            <img id="img1">
        </div>

        <div class="bottom-pokemon">
            <img id="img2">
        </div>

        <div class="bottom-card">
            <h2 id="name2">Pokemon 2</h2>
            <span class="power2" id="power2"></span>
        </div>

    </div>

    <div class="log-title">Battle Log</div>

    <div class="bottom-section">

        <div class="log" id="log">
            Click Start Battle!
        </div>

        <button onclick="battle()">Start Battle!</button>

    </div>

</div>

<script>

async function battle(){

    let id1 = Math.floor(Math.random()*151)+1;
    let id2 = Math.floor(Math.random()*151)+1;

    while(id1===id2){
        id2 = Math.floor(Math.random()*151)+1;
    }

    let res1 = await fetch(`https://pokeapi.co/api/v2/pokemon/${id1}`);
    let p1 = await res1.json();

    let res2 = await fetch(`https://pokeapi.co/api/v2/pokemon/${id2}`);
    let p2 = await res2.json();

    document.getElementById("name1").innerText =
        p1.name.charAt(0).toUpperCase()+p1.name.slice(1);

    document.getElementById("name2").innerText =
        p2.name.charAt(0).toUpperCase()+p2.name.slice(1);

    document.getElementById("power1").innerText =
        "Power: " + p1.base_experience;

    document.getElementById("power2").innerText =
        "Power: " + p2.base_experience;

    document.getElementById("img1").src =
        p1.sprites.other["official-artwork"].front_default;

    document.getElementById("img2").src =
        p2.sprites.other["official-artwork"].front_default;

    let winner;

    if(p1.base_experience > p2.base_experience){
        winner = p1.name;
    }
    else if(p2.base_experience > p1.base_experience){
        winner = p2.name;
    }
    else{
        winner = "No one! It's a Draw";
    }

    document.getElementById("log").innerHTML =
        `<b>${p1.name}</b> (${p1.base_experience}) battled 
         <b>${p2.name}</b> (${p2.base_experience})<br><br>
         Winner: <b>${winner.toUpperCase()}</b> 🏆`;
}

</script>

</body>
</html>
